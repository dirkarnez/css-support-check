<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width, height=device-height">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
  <a href="https://github.com/dirkarnez/css-check-support" target="_blank">dirkarnez/css-check-support</a><br>
  <div id="container"></div>
  <script>
    const div = document.getElementById("container");
    const log = (...data) => div.innerHTML += `${data.join(String.fromCharCode(0x20))}<br>`;
    const error = (...data) => div.innerHTML += `<span style="color: red">${data.join(String.fromCharCode(0x20))}<span><br>`;
    const check = (descripten, code) => CSS.supports(code) ? log(`[Supported] ${descripten}`) : error(`[Not supported] ${descripten}`);
    check("dvh", "height: 100dvh");
  </script>
</body>
</html>
